const ALL = DATA.flatMap(s => s.items.map(it => ({ ...it, cat: s.cat })));
const KB = ALL.filter(it => (it.keys || []).length > 0);   // pressable combos for the quiz
const TOTAL = ALL.length;
const ESSENTIALS = ALL.filter(it => it.top).length;

/* render `code` spans inside use text */
function withCode(text) {
  return String(text).split(/(`[^`]+`)/g).map((p, i) =>
    p.startsWith("`") && p.endsWith("`")
      ? <code key={i} className="font-mono text-[0.82em] text-clay-dark bg-clay/10 px-1 py-0.5 rounded">{p.slice(1, -1)}</code>
      : <React.Fragment key={i}>{p}</React.Fragment>);
}

/* -------- keycap -------- */
function Cap({ k }) {
  const sym = SYM[k];
  const label = k.replace(" Arrow", "");
  if (sym) {
    return (
      <kbd className="inline-flex flex-col items-center justify-center min-w-[2.1rem] px-2 py-1 rounded-lg bg-white border border-stone-300 border-b-[3px] shadow-sm leading-none">
        <span className="text-clay font-bold text-sm">{sym}</span>
        <span className="text-[8px] uppercase tracking-wide text-stone-400 mt-0.5">{label}</span>
      </kbd>
    );
  }
  return (
    <kbd className="inline-flex items-center justify-center min-w-[2.1rem] h-[2.1rem] px-2 rounded-lg bg-white border border-stone-300 border-b-[3px] shadow-sm font-mono text-sm font-semibold text-stone-700">{k}</kbd>
  );
}

function Keys({ item, justify }) {
  const keys = item.keys || [];
  return (
    <div className={"flex flex-wrap items-center gap-1.5 " + (justify || "")}>
      {keys.map((k, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span className="text-stone-400 text-xs font-mono">+</span>}
          <Cap k={k} />
        </React.Fragment>
      ))}
      {item.note && (
        <>
          {keys.length > 0 && <span className="text-stone-400 text-xs font-mono">+</span>}
          <span className="italic text-xs text-clay-dark bg-clay/10 border border-dashed border-clay/40 px-2.5 py-1 rounded-full">{item.note}</span>
        </>
      )}
    </div>
  );
}

/* -------- Trainer (playground quiz) -------- */
function sample(arr, n, exclude) {
  const out = [], used = new Set();
  let guard = 0;
  while (out.length < n && guard < 500) {
    guard++;
    const c = arr[Math.floor(Math.random() * arr.length)];
    if (c.action === exclude.action || used.has(c.action)) continue;
    used.add(c.action); out.push(c);
  }
  return out;
}
function makeQ() {
  const correct = KB[Math.floor(Math.random() * KB.length)];
  const opts = [correct, ...sample(KB, 3, correct)]
    .map(o => ({ o, r: Math.random() })).sort((a, b) => a.r - b.r).map(x => x.o);
  return { correct, opts };
}

function Trainer() {
  const [q, setQ] = useState(makeQ);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [seen, setSeen] = useState(0);
  const [streak, setStreak] = useState(0);

  const choose = (o) => {
    if (picked) return;
    setPicked(o);
    setSeen(s => s + 1);
    if (o.action === q.correct.action) { setScore(s => s + 1); setStreak(s => s + 1); }
    else setStreak(0);
  };
  const next = () => { setQ(makeQ()); setPicked(null); };

  return (
    <div className="rounded-2xl overflow-hidden shadow-xl ring-1 ring-black/5 bg-[#262220]">
      {/* title bar */}
      <div className="flex items-center gap-1.5 px-3 py-2 bg-[#1d1a18]">
        <span className="w-2.5 h-2.5 rounded-full bg-[#ff5f57]"></span>
        <span className="w-2.5 h-2.5 rounded-full bg-[#febc2e]"></span>
        <span className="w-2.5 h-2.5 rounded-full bg-[#28c840]"></span>
        <span className="ml-1.5 text-stone-400 text-[11px] font-mono">trainer — zsh</span>
        <span className="ml-auto text-[11px] font-mono text-stone-300">
          {score}/{seen} {streak >= 2 && <span className="text-clay">· 🔥{streak}</span>}
        </span>
      </div>

      {/* prompt */}
      <div className="px-4 pt-4 font-mono text-[13px] text-stone-300">
        <span className="text-emerald-400">michael@mac</span> <span className="text-stone-500">~</span> %
        <span className="text-stone-400"> # which shortcut?</span>
      </div>
      <div className="px-4 pt-2 pb-1">
        <p className="text-stone-100 font-semibold text-[15px]">{q.correct.action}</p>
        <p className="text-stone-400 text-[13px] mt-1">{withCode(q.correct.use)}</p>
      </div>

      {/* options */}
      <div className="px-4 py-3 grid grid-cols-1 gap-2">
        {q.opts.map((o, i) => {
          const isCorrect = o.action === q.correct.action;
          const isPicked = picked && o.action === picked.action;
          let ring = "border-stone-700";
          if (picked) {
            if (isCorrect) ring = "border-emerald-500 bg-emerald-500/10";
            else if (isPicked) ring = "border-red-500 bg-red-500/10";
            else ring = "border-stone-800 opacity-50";
          }
          return (
            <button key={i} onClick={() => choose(o)} disabled={!!picked}
              className={"flex items-center justify-between gap-3 rounded-xl border-2 px-3 py-2.5 text-left transition " + ring + (picked ? "" : " active:bg-white/5 hover:border-stone-500")}>
              <Keys item={o} />
              {picked && isCorrect && <span className="text-emerald-400 text-lg shrink-0">✓</span>}
              {picked && isPicked && !isCorrect && <span className="text-red-400 text-lg shrink-0">✗</span>}
            </button>
          );
        })}
      </div>

      {/* feedback / next */}
      <div className="px-4 pb-4 flex items-center gap-3">
        {picked
          ? <p className="text-[13px] text-stone-300 font-mono">
              {picked.action === q.correct.action ? "Nailed it." : "Not quite — see the ✓ above."}
            </p>
          : <p className="text-[13px] text-stone-500 font-mono">Tap the shortcut that does this.</p>}
        <button onClick={next}
          className="ml-auto text-sm font-mono px-4 py-2 rounded-lg bg-clay text-white active:bg-clay-dark">
          {picked ? "Next →" : "Skip"}
        </button>
      </div>
    </div>
  );
}

/* -------- Reference list -------- */
function RefList({ items }) {
  if (!items.length) return <div className="text-center py-12 text-stone-400 text-sm">No shortcuts match that search.</div>;
  return (
    <div className="space-y-2.5">
      {items.map((it, i) => (
        <div key={i} className={"p-4 rounded-xl bg-white border " + (it.top ? "border-emerald-300" : "border-stone-200")}>
          <Keys item={it} />
          <div className="flex items-center gap-2 mt-3">
            <span className="font-semibold text-ink">{it.action}</span>
            {it.top && <span className="text-[10px] font-mono uppercase tracking-wide text-emerald-600 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded">★ Essential</span>}
          </div>
          <p className="text-sm text-stone-600 mt-1">{withCode(it.use)}</p>
        </div>
      ))}
    </div>
  );
}

/* -------- Flashcards -------- */
function Cards() {
  const deck = useMemo(() =>
    ALL.map((c, i) => ({ c, k: (i * 7 + 3) % ALL.length })).sort((a, b) => a.k - b.k).map(x => x.c), []);
  const [i, setI] = useState(0);
  const [flip, setFlip] = useState(false);
  const card = deck[i];
  const go = d => { setFlip(false); setI(v => (v + d + deck.length) % deck.length); };
  return (
    <div>
      <div onClick={() => setFlip(f => !f)}
        className="cursor-pointer select-none rounded-2xl bg-white border border-stone-200 shadow-sm p-7 min-h-[210px] flex flex-col items-center justify-center text-center active:shadow-md">
        <span className="text-[10px] uppercase tracking-wider text-clay font-semibold mb-3">{card.cat}</span>
        {!flip
          ? <div><p className="text-stone-700 text-[15px]">{withCode(card.use)}</p><p className="text-xs text-stone-400 mt-4">tap to reveal the shortcut</p></div>
          : <div className="fade-in flex flex-col items-center gap-3"><Keys item={card} justify="justify-center" /><p className="font-semibold text-ink">{card.action}</p></div>}
      </div>
      <div className="flex items-center justify-between mt-3">
        <button onClick={() => go(-1)} className="px-5 py-2.5 rounded-lg bg-white border border-stone-200 active:border-clay/50 text-sm">‹ Prev</button>
        <span className="text-sm text-stone-400 font-mono">{i + 1} / {deck.length}</span>
        <button onClick={() => go(1)} className="px-5 py-2.5 rounded-lg bg-ink text-white active:bg-clay text-sm">Next ›</button>
      </div>
    </div>
  );
}

/* -------- App -------- */
const TABS = ["All", ...DATA.map(d => d.cat), "★ Essentials", "Cards"];

  const [tab, setTab] = useState("All");
  const [q, setQ] = useState("");
  const query = q.trim().toLowerCase();

  const filtered = useMemo(() => {
    return ALL.filter(it => {
      const catOk = tab === "All" || (tab === "★ Essentials" ? it.top : it.cat === tab);
      const hay = ((it.keys || []).join(" ") + " " + (it.note || "") + " " + it.action + " " + it.use + " " + it.cat).toLowerCase();
      return catOk && (!query || hay.includes(query));
    });
  }, [tab, query]);

  return (
    <div className="max-w-xl mx-auto px-4 py-7">
      <header className="mb-6">
        <div className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-clay/10 text-clay-dark text-[11px] font-medium mb-3">
          <span className="w-1.5 h-1.5 rounded-full bg-clay animate-pulse"></span> Interactive · phone-friendly
        </div>
        <h1 className="text-3xl font-bold tracking-tight text-ink">macOS Terminal Cheat Sheet</h1>
        <p className="mt-2 text-stone-600 text-[15px]">Every keystroke that makes the command line faster — paired with the exact moment you'd reach for it. {TOTAL} shortcuts across 5 categories.</p>
      </header>

      <section className="mb-8">
        <SectionTitle eyebrow="Trainer" title="Quiz yourself" />
        <Trainer />
        <p className="text-[11px] text-stone-400 mt-2">Read the situation, tap the shortcut that fits. Builds muscle memory without touching your real Terminal.</p>
      </section>

      <section>
        <SectionTitle eyebrow="Reference" title="Browse & search" />
        <div className="flex gap-1 p-1 rounded-xl bg-stone-100 mb-3 overflow-x-auto no-scrollbar">
          {TABS.map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={"shrink-0 px-3.5 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap " + (tab === t ? "bg-white shadow-sm text-ink" : "text-stone-500")}>{t}</button>
          ))}
        </div>
        {tab !== "Cards" && (
          <>
            <div className="relative mb-3">
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search shortcuts, actions, or situations…"
                className="w-full pl-10 pr-3 py-3 rounded-xl border border-stone-200 bg-white outline-none focus:border-clay/60" />
              <span className="absolute left-3.5 top-3 text-stone-400 text-lg">⌕</span>
            </div>
            <p className="text-xs text-stone-400 font-mono mb-3">Showing <b className="text-clay">{filtered.length}</b> of {TOTAL}</p>
          </>
        )}
        <div className="min-h-[200px]">
          {tab === "Cards" ? <Cards /> : <RefList items={filtered} />}
        </div>
      </section>

      <footer className="mt-12 pt-5 border-t border-stone-200 text-[11px] text-stone-400 space-y-1 safe-b">
        <p>Interactive macOS Terminal shortcuts reference. Symbols: ⌘ Command · ⌃ Control · ⌥ Option · ⇧ Shift.</p>
        <p>On a Mac, press <b className="text-clay-dark">Cmd-P</b> to print this as a one-page reference.</p>
      </footer>
    </div>
  );
}

function SectionTitle({ eyebrow, title }) {
  return (
    <div className="mb-3">
      <div className="text-[10px] uppercase tracking-widest text-clay font-semibold">{eyebrow}</div>
      <h2 className="text-lg font-semibold text-ink mt-0.5">{title}</h2>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
